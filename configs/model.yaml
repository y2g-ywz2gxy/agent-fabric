# -*- yaml -*-
# AgentScope 模型配置文件
# 
# 该配置文件定义了 AgentScope 执行器的模型配置，
# 包括是否启用、模型提供商、模型名称等。

schema_version: "1.0"

# AgentScope 执行器配置
executor:
  # 是否启用 AgentScope 执行器
  # 设置为 false 时将使用规则执行器作为降级方案
  enabled: true
  
  # 模型提供商: openai / dashscope / ollama
  provider: dashscope
  
  # 模型名称
  model_name: qwen3-max
  
  # API 密钥（建议使用环境变量覆盖）
  # 对于 openai 和 dashscope 提供商，需要配置 API 密钥
  # 对于 ollama 提供商，此项可留空
  api_key: "sk-660d43f7783249aaae2ee947b5e3a813"  # 支持环境变量引用
  
  # ReAct 代理配置
  react:
    # 最大迭代次数
    max_iters: 5
    
    # 系统提示词
    sys_prompt: |
      你是一个自适应编排执行代理。根据计划步骤执行任务并输出结构化结果。
      请按照以下格式输出：
      1. 思考：分析当前任务
      2. 行动：执行具体操作
      3. 结果：输出最终答案

# 各提供商默认配置
providers:
  openai:
    # OpenAI API 基础 URL（可选，用于代理或自定义端点）
    # base_url: https://api.openai.com/v1
    
    # 是否启用流式输出
    stream: false
    
  dashscope:
    # 阿里云 DashScope 配置
    base_url: https://api.dashscope.com/v1
    stream: false
    
  ollama:
    # Ollama 本地模型配置
    # base_url: http://localhost:11434
    stream: false
